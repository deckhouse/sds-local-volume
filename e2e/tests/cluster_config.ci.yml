# CI cluster config for the commander-provider e2e variant
# (.github/workflows/e2e-tests-commander.yml, triggered by the
# `e2e/commander/run` label). It differs from cluster_config.yml in ONE way: the
# sds-local-volume modulePullOverride is the env reference ${E2E_MODULE_IMAGE_TAG},
# resolved by the bootstrap step (LoadClusterDefinition) to the PR's image tag.
# The local-run loader rejects ${...}, which is why this lives in a separate file
# and cluster_config.yml keeps a literal tag.
#
# In the commander CI flow only the `modules:` list + dkpParameters.registryRepo
# are consumed (module enablement runs inside bootstrap); the masters/workers/
# subnets below are present to satisfy validation — the cluster itself is created
# from the Commander template, which pre-provisions the workers and their raw
# block devices, so BeforeSuite adopts the devices the template already exposes.
clusterDefinition:
  masters:
    - hostname: "master-1"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
  workers:
    - hostname: "worker-1"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
    - hostname: "worker-2"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
  dkpParameters:
    kubernetesVersion: "Automatic"
    podSubnetCIDR: "10.112.0.0/16"
    serviceSubnetCIDR: "10.225.0.0/16"
    clusterDomain: "cluster.local"
    registryRepo: "dev-registry.deckhouse.io/sys/deckhouse-oss"
    devBranch: "main"
    modules:
      # The released layer is pinned with modulePullOverride "main"; only
      # sds-local-volume (the module under test) is resolved to the PR image tag.
      - name: "snapshot-controller"
        version: 1
        enabled: true
        modulePullOverride: "main"
        dependencies: []
      - name: "sds-node-configurator"
        version: 1
        enabled: true
        modulePullOverride: "main"
        dependencies: []
      - name: "sds-local-volume"
        version: 1
        enabled: true
        # Resolved during bootstrap to the PR image tag (e.g. pr123). The
        # pipeline exports E2E_MODULE_IMAGE_TAG from the module_image_tag input.
        modulePullOverride: "${E2E_MODULE_IMAGE_TAG}"
        dependencies:
          - "snapshot-controller"
          - "sds-node-configurator"
