# sds-local-volume e2e nested test cluster (local-run variant).
#
# 1 master + 2 workers. The workers carry the raw block devices the suite turns
# into LVMVolumeGroups (a disk per worker is attached at runtime in BeforeSuite
# when a base cluster is available, otherwise the Commander template is expected
# to pre-provision consumable block devices).
#
# Modules enabled here are the minimum the e2e harness needs on top of a freshly
# bootstrapped Deckhouse:
#   - snapshot-controller    : CSI snapshotter, dependency of the storage stack.
#   - sds-node-configurator  : scans block devices on each node and publishes
#                              BlockDevice CRs (the disks the LVMVolumeGroups adopt).
#   - sds-local-volume       : the module under test; reconciles LocalStorageClass
#                              into StorageClasses and drives the local CSI driver.
#                              modulePullOverride defaults to the literal "main";
#                              override it for a local run by exporting
#                              SDS_LOCAL_VOLUME_MODULE_PULL_OVERRIDE=pr<N>.
clusterDefinition:
  masters:
    - hostname: "master-1"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
  workers:
    - hostname: "worker-1"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
    - hostname: "worker-2"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
  dkpParameters:
    kubernetesVersion: "Automatic"
    podSubnetCIDR: "10.112.0.0/16"
    serviceSubnetCIDR: "10.225.0.0/16"
    clusterDomain: "cluster.local"
    registryRepo: "dev-registry.deckhouse.io/sys/deckhouse-oss"
    devBranch: "main"
    modules:
      - name: "snapshot-controller"
        version: 1
        enabled: true
        modulePullOverride: "main"
        dependencies: []
      - name: "sds-node-configurator"
        version: 1
        enabled: true
        modulePullOverride: "main"
        dependencies: []
      - name: "sds-local-volume"
        version: 1
        enabled: true
        modulePullOverride: "main"
        dependencies:
          - "snapshot-controller"
          - "sds-node-configurator"
