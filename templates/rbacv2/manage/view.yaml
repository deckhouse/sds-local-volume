apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    heritage: deckhouse
    module: sds-local-volume
    rbac.deckhouse.io/aggregate-to-storage-as: viewer
    rbac.deckhouse.io/kind: manage
    rbac.deckhouse.io/level: module
    rbac.deckhouse.io/namespace: d8-sds-local-volume
  name: d8:manage:permission:module:sds-local-volume:view
rules:
  - apiGroups:
      - storage.deckhouse.io
    resources:
      - localstorageclasses
    verbs:
      - get
      - list
      - watch
