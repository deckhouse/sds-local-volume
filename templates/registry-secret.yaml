---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-module-registry
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
type: kubernetes.io/dockerconfigjson
data:
{{- if dig "registry" "dockercfg" false .Values.sdsLocalVolume }}
  .dockerconfigjson: {{ .Values.sdsLocalVolume.registry.dockercfg }}
{{- else }}
  .dockerconfigjson: "eyJhdXRocyI6IHsgInJlZ2lzdHJ5LmRlY2tob3VzZS5pbyI6IHt9fX0="
{{- end }}
---
{{- $moduleDockercfg := dig "registry" "dockercfg" "" .Values.sdsLocalVolume }}
{{- /* Second source of auths: storage-foundation when it is enabled, otherwise the DKP (Deckhouse) registry */}}
{{- $secondDockercfg := .Values.global.modulesImages.registry.dockercfg }}
{{- if .Values.global.enabledModules | has "storage-foundation" }}
  {{- $secondDockercfg = dig "registry" "dockercfg" $secondDockercfg (default dict .Values.storageFoundation) }}
{{- end }}
{{- $secondCfg := $secondDockercfg | b64dec | fromJson }}
{{- $auths := $secondCfg.auths | default dict }}
{{- if $moduleDockercfg }}
  {{- $moduleCfg := $moduleDockercfg | b64dec | fromJson }}
  {{- $auths = merge $auths ($moduleCfg.auths | default dict) }}
{{- end }}
{{- $deckhouseDockercfg := set $secondCfg "auths" $auths | toJson | b64enc }}
apiVersion: v1
kind: Secret
metadata:
  name: deckhouse-registry
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $deckhouseDockercfg }}
