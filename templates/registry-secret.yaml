---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-module-registry
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
type: kubernetes.io/dockerconfigjson
data:
{{- if dig "registry" "dockercfg" false .Values.sdsLocalVolume }}
  .dockerconfigjson: {{ .Values.sdsLocalVolume.registry.dockercfg }}
{{- else }}
  .dockerconfigjson: "eyJhdXRocyI6IHsgInJlZ2lzdHJ5LmRlY2tob3VzZS5pbyI6IHt9fX0="
{{- end }}
---
{{- $globalDockercfg := .Values.global.modulesImages.registry.dockercfg }}
{{- $moduleDockercfg := dig "registry" "dockercfg" "" .Values.sdsLocalVolume }}
{{- /* Base registry: storage-foundation when it is enabled, otherwise the general Deckhouse registry */}}
{{- $baseDockercfg := $globalDockercfg }}
{{- if .Values.global.enabledModules | has "storage-foundation" }}
  {{- $sfDockercfg := dig "registry" "dockercfg" "" (default dict .Values.storageFoundation) }}
  {{- if $sfDockercfg }}
    {{- $baseDockercfg = $sfDockercfg }}
  {{- end }}
{{- end }}
{{- $deckhouseDockercfg := $baseDockercfg }}
{{- if and $moduleDockercfg (ne $moduleDockercfg $baseDockercfg) }}
  {{- $baseCfg := $baseDockercfg | b64dec | fromJson }}
  {{- $moduleCfg := $moduleDockercfg | b64dec | fromJson }}
  {{- $mergedAuths := merge ($baseCfg.auths | default dict) ($moduleCfg.auths | default dict) }}
  {{- $deckhouseDockercfg = set $baseCfg "auths" $mergedAuths | toJson | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: deckhouse-registry
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $deckhouseDockercfg }}
