---
{{- $systemIgnoredPrefixes := default (list) .Values.sdsLocalVolume.internal.storageClassLabelIgnoredPrefixesSystem }}
{{- $userIgnoredPrefixes := default (list) .Values.sdsLocalVolume.storageClassLabelIgnoredPrefixes }}
{{- $ignoredPrefixes := concat $systemIgnoredPrefixes $userIgnoredPrefixes | uniq }}
apiVersion: v1
kind: Secret
metadata:
  name: d8-{{ .Chart.Name }}-controller-config
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "controller")) | nindent 2 }}
type: Opaque
stringData:
  config: |-
    nodeSelector: {{ .Values.sdsLocalVolume.dataNodes.nodeSelector | toYaml | nindent 6 }}
    storageClassLabelIgnoredPrefixes: {{ $ignoredPrefixes | toYaml | nindent 6 }}
