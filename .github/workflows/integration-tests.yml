# Runs the controller-runtime envtest integration tests (build tag
# `integration`), which the shared go_tests action skips because it runs plain
# `go test` without build tags. A real kube-apiserver + etcd are provided by
# setup-envtest.

name: Integration tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  controller-integration:
    name: Controller integration tests (envtest)
    runs-on: [self-hosted, regular]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"

      - name: Run controller envtest integration tests
        working-directory: images/controller
        run: |
          set -euo pipefail
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.19
          SETUP_ENVTEST="$(go env GOPATH)/bin/setup-envtest"
          export KUBEBUILDER_ASSETS="$("$SETUP_ENVTEST" use 1.31.0 -p path)"
          go test -tags integration ./test/integration/... -count=1 -v
