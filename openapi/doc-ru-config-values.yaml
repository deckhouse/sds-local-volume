type: object
properties:
  logLevel:
    description: Уровень логирования модуля.
  dataNodes:
    description: Настройки локальных томов csi на узлах с данными
    properties:
      nodeSelector:
        description: |
          То же, что и в параметре `spec.nodeSelector` подов в Kubernetes.
                       
          Если параметр опущен, локальный том csi будет размещен на всех узлах.

          **Внимание!** Изменение этого параметра не приводит к перераспределению данных. Если узел с данными больше не соответствует «nodeSelector», данные на этом узле станут недоступными.
  storageClassLabelIgnoredPrefixes:
    description: |
      Список префиксов ключей лейблов, которые НЕ должны пробрасываться (propagate — копироваться)
      с `LocalStorageClass` на управляемый `StorageClass` в Kubernetes.

      Контроллер объединяет этот список с системным (system — служебным, неизменяемым) списком
      и при формировании лейблов `StorageClass` отбрасывает любой лейбл `LocalStorageClass`,
      ключ которого начинается с одного из префиксов объединённого списка.

      Сопоставление выполняется по `strings.HasPrefix` (буквальное префиксное сравнение,
      без учёта структуры лейбла Kubernetes). Запись без завершающего `/` совпадает
      по подстроке, а не по полному ключу: например, `team` отбросит и `team`,
      и `team-id`, и `team.example.com/...`. Чтобы ограничить совпадение конкретным
      поддоменом, заканчивайте запись на `/` (например, `argocd.argoproj.io/`).
      Чтобы ориентироваться на точный ключ, пишите ключ целиком, помня, что он также
      покроет ключи, имя которых его расширяет
      (например, `app.kubernetes.io/managed-by` отбросит и `app.kubernetes.io/managed-by-foo`).

      Системный префикс `kubernetes.io/` покрывает только ключи, начинающиеся буквально
      на `kubernetes.io/`; зарезервированные K8s поддомены (subdomains) — например,
      `topology.kubernetes.io/zone` или `node.kubernetes.io/*` — по умолчанию НЕ покрываются.
      При необходимости добавляйте их в этот список явно.

      Значения по умолчанию покрывают лейблы, которые обычно проставляют инструменты GitOps
      (Argo CD, Flux, Rancher Fleet), чтобы их реконсилеры (reconcilers — компоненты,
      приводящие фактическое состояние к желаемому) не конфликтовали с контроллером
      `sds-local-volume` за состояние лейблов на управляемом `StorageClass`.
